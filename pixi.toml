[workspace]
authors = ["ben <ben.uzh@proton.me>"]
channels = ["conda-forge", "bioconda"]
name = "7-integrate-py"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/7-integrate-py.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/7-integrate-py.yml"

[dependencies]
python = ">=3.11"
scanorama = "*"
pyyaml = "*"
h5py = "*"
numpy = "*"
polars = "*"
